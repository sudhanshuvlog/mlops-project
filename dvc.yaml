stages:
  train:
    cmd: ./venv/bin/python src/train.py
    deps:
      - src/train.py
      - src/preprocess.py
      - src/s3_utils.py
      - data/loan_data.csv
    outs:
      - models/model.pkl
      - models/scaler.pkl
      - models/label_encoder.pkl
    metrics:
      - metrics.json:
          cache: false
